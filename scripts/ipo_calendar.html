<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 港股打新助手 - 新股日历</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-8">
                    <a class="text-xl font-bold text-orange-600" href="/">🦞 港股打新助手</a>
                    <div class="flex gap-6">
                        <a class="text-gray-600 hover:text-orange-600 font-medium" href="/">新股日历</a>
                        <a class="text-gray-600 hover:text-orange-600 font-medium" href="/tutorial">打新课程</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- 标题区域 -->
        <div class="bg-gradient-to-r from-orange-500 to-red-500 rounded-2xl p-8 mb-8 text-white">
            <h1 class="text-3xl font-bold mb-2">港股打新决策助手</h1>
            <p class="text-orange-100">帮您分析新股价值，做出更明智的打新决策</p>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 text-center">
                <p class="text-3xl font-bold text-orange-600" id="ongoingCount">0</p>
                <p class="text-sm text-gray-500">可认购新股</p>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 text-center">
                <p class="text-3xl font-bold text-green-600" id="recommendBuy">0</p>
                <p class="text-sm text-gray-500">建议申购</p>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 text-center">
                <p class="text-3xl font-bold text-red-600" id="recommendAvoid">0</p>
                <p class="text-sm text-gray-500">不建议</p>
            </div>
        </div>

        <!-- 正在招股 -->
        <section class="mb-10" id="ongoingSection">
            <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                正在招股
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="ongoingList">
                <!-- 动态填充 -->
            </div>
        </section>

        <!-- 认购已截止 -->
        <section class="mb-10" id="closedSection">
            <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                认购已截止
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="closedList">
                <!-- 动态填充 -->
            </div>
        </section>

        <!-- 风险提示 -->
        <div class="mt-8 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
            <p class="text-sm text-yellow-800">⚠️ 风险提示：本工具仅供参考，不构成投资建议。打新有风险，申购需谨慎。</p>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:8765/api';

        // 股票数据（根据目标页面提取）
        const ipoStocks = [
            {
                code: '03625',
                name: '上海傅里叶半导体',
                english: 'Fourier Semiconductor',
                priceMin: 40,
                priceMax: 50,
                raisingMin: 20.0,
                raisingMax: 25.0,
                deadline: '2026-03-26',
                listDate: '2026-03-31',
                industry: '半导体',
                entryFee: 25000,
                recommendation: 'caution', // buy, caution, avoid
                heatLevel: 3
            },
            {
                code: '00664',
                name: '杭州铜师傅文创',
                english: 'TongShiFu Cultural',
                priceMin: 60,
                priceMax: 68,
                raisingMin: 18.0,
                raisingMax: 20.4,
                deadline: '2026-03-26',
                listDate: '2026-03-31',
                industry: '文创 IP',
                entryFee: 13600,
                recommendation: 'caution',
                heatLevel: 3
            },
            {
                code: '01021',
                name: '广东华沿机器人',
                english: 'HuaYan Robotics',
                priceMin: 17,
                priceMax: 17,
                raisingMin: 13.6,
                raisingMax: 13.6,
                deadline: '2026-03-25',
                listDate: '2026-03-30',
                industry: '工业机器人',
                entryFee: 17000,
                recommendation: 'buy',
                heatLevel: 3
            },
            {
                code: '02667',
                name: '北京同仁堂医养',
                english: 'Tongrentang Healthcare',
                priceMin: 7.3,
                priceMax: 8.3,
                raisingMin: 8.8,
                raisingMax: 10.0,
                deadline: '2026-03-25',
                listDate: '待定',
                industry: '医疗健康',
                entryFee: 16600,
                recommendation: 'buy',
                heatLevel: 1
            },
            {
                code: '02726',
                name: '瀚天天成电子',
                english: 'Hantian Electronics',
                priceMin: 76.26,
                priceMax: 76.26,
                raisingMin: 15.3,
                raisingMax: 15.3,
                deadline: '2026-03-25',
                listDate: '2026-03-30',
                industry: '半导体材料',
                entryFee: 7626,
                recommendation: 'avoid',
                heatLevel: 3
            },
            {
                code: '06636',
                name: '山东极视角科技',
                english: 'Extreme Vision',
                priceMin: 40,
                priceMax: 40,
                raisingMin: 16.0,
                raisingMax: 16.0,
                deadline: '2026-03-25',
                listDate: '2026-03-30',
                industry: 'AI 视觉',
                entryFee: 8000,
                recommendation: 'caution',
                heatLevel: 3
            },
            {
                code: '02526',
                name: '杭州德适生物',
                english: 'Deshield Bio',
                priceMin: 95.6,
                priceMax: 112.5,
                raisingMin: 14.3,
                raisingMax: 16.9,
                deadline: '2026-03-25',
                listDate: '2026-03-30',
                industry: '医疗器械',
                entryFee: 11250,
                recommendation: 'caution',
                heatLevel: 3
            },
            {
                code: '02729',
                name: '浙江凯乐士科技',
                english: 'Galax Technology',
                priceMin: 16.4,
                priceMax: 20.4,
                raisingMin: 9.8,
                raisingMax: 12.2,
                deadline: '2026-03-19',
                listDate: '2026-03-24',
                industry: '智能物流',
                entryFee: 10200,
                recommendation: 'buy',
                heatLevel: 2
            }
        ];

        function getRecommendationLabel(rec) {
            const labels = {
                'buy': { text: '申购', class: 'bg-green-100 text-green-700 border-green-200' },
                'caution': { text: '谨慎', class: 'bg-yellow-100 text-yellow-700 border-yellow-200' },
                'avoid': { text: '不建议', class: 'bg-red-100 text-red-700 border-red-200' }
            };
            return labels[rec] || labels['caution'];
        }

        function getHeatEmoji(level) {
            return '🔥'.repeat(level);
        }

        function formatCurrency(amount) {
            return amount.toLocaleString();
        }

        function isClosed(deadline) {
            const today = new Date().toISOString().split('T')[0];
            return deadline < today;
        }

        function createStockCard(stock) {
            const rec = getRecommendationLabel(stock.recommendation);
            const closed = isClosed(stock.deadline);
            
            return `
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 hover:shadow-md transition-shadow cursor-pointer">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="text-lg font-bold text-gray-900">${stock.name}</h3>
                            <p class="text-sm text-gray-500">${stock.code} · ${stock.english}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-sm font-medium border ${rec.class}">
                            ${getHeatEmoji(stock.heatLevel)} ${rec.text}
                        </span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <div>
                            <span class="text-gray-500">发行价</span>
                            <p class="font-medium">HKD ${stock.priceMin}${stock.priceMax !== stock.priceMin ? ' ~ ' + stock.priceMax : ''}</p>
                        </div>
                        <div>
                            <span class="text-gray-500">募资规模</span>
                            <p class="font-medium">${stock.raisingMin}${stock.raisingMax !== stock.raisingMin ? ' ~ ' + stock.raisingMax : ''} 亿</p>
                        </div>
                        <div>
                            <span class="text-gray-500">认购截止</span>
                            <p class="font-medium ${closed ? 'text-gray-400' : 'text-red-600'}">${stock.deadline}</p>
                        </div>
                        <div>
                            <span class="text-gray-500">上市日</span>
                            <p class="font-medium">${stock.listDate}</p>
                        </div>
                        <div>
                            <span class="text-gray-500">行业</span>
                            <p class="font-medium">${stock.industry}</p>
                        </div>
                        <div>
                            <span class="text-gray-500">入场费</span>
                            <p class="font-medium text-blue-600">HKD ${formatCurrency(stock.entryFee)}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStocks() {
            const ongoing = ipoStocks.filter(s => !isClosed(s.deadline));
            const closed = ipoStocks.filter(s => isClosed(s.deadline));
            
            // 更新统计
            document.getElementById('ongoingCount').textContent = ongoing.length;
            document.getElementById('recommendBuy').textContent = ipoStocks.filter(s => s.recommendation === 'buy').length;
            document.getElementById('recommendAvoid').textContent = ipoStocks.filter(s => s.recommendation === 'avoid').length;
            
            // 渲染列表
            document.getElementById('ongoingList').innerHTML = ongoing.map(createStockCard).join('');
            document.getElementById('closedList').innerHTML = closed.map(createStockCard).join('');
            
            // 隐藏空 section
            document.getElementById('ongoingSection').style.display = ongoing.length > 0 ? 'block' : 'none';
            document.getElementById('closedSection').style.display = closed.length > 0 ? 'block' : 'none';
        }

        // 页面加载时渲染
        document.addEventListener('DOMContentLoaded', renderStocks);
    </script>
</body>
</html>
